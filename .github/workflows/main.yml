name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t fastapi-app .

    - name: Tag Image for Nexus
      run: |
        docker tag fastapi-app:latest \
        ${{ secrets.NEXUS_URL }}/docker-hosted/fastapi-app:latest

    - name: Login to Nexus
      run: |
        echo "${{ secrets.NEXUS_PASSWORD }}" | docker login \
        ${{ secrets.NEXUS_URL }} \
        --username ${{ secrets.NEXUS_USERNAME }} \
        --password-stdin

    - name: Push Image to Nexus
      run: |
        docker push \
        ${{ secrets.NEXUS_URL }}/docker-hosted/fastapi-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker login ${{ secrets.NEXUS_URL }} \
          -u ${{ secrets.NEXUS_USERNAME }} \
          -p ${{ secrets.NEXUS_PASSWORD }}

          docker pull ${{ secrets.NEXUS_URL }}/docker-hosted/fastapi-app:latest

          docker stop fastapi-app || true
          docker rm fastapi-app || true

          docker run -d -p 8000:8000 \
          --name fastapi-app \
          ${{ secrets.NEXUS_URL }}/docker-hosted/fastapi-app:latest
